<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>منظومة السيرة والمواظبة</title><script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script><style>body{margin:0;font-family:Tahoma,Arial;background:#f8fafc}#m{padding:25px;text-align:center;font-weight:bold}iframe{border:0;width:100vw;height:100vh;display:block}</style></head><body><div id="m">جاري فتح التطبيق...</div><script>async function run(){try{let r=await fetch('https://api.github.com/repos/princejour/sira-firebase-test-apk/git/trees/main?recursive=1');let j=await r.json();let z=(j.tree||[]).filter(x=>/\.zip$/i.test(x.path)).sort((a,b)=>a.path.localeCompare(b.path,undefined,{numeric:true})).pop();if(!z)throw Error('لا يوجد ZIP في مستودع التطبيق');let u='https://raw.githubusercontent.com/princejour/sira-firebase-test-apk/main/'+z.path.split('/').map(encodeURIComponent).join('/');let b=await (await fetch(u)).arrayBuffer();let zip=await JSZip.loadAsync(b);let n=Object.keys(zip.files).find(p=>/app\/src\/main\/assets\/index\.html$/i.test(p))||Object.keys(zip.files).find(p=>/(^|\/)index\.html$/i.test(p));let h=await zip.files[n].async('string');let f=document.createElement('iframe');document.body.innerHTML='';document.body.appendChild(f);f.srcdoc=h}catch(e){document.getElementById('m').textContent='خطأ: '+e.message}}run()</script></body></html>
