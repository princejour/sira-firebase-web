<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>賲賳馗賵賲丞 丕賱爻賷乇丞 賵丕賱賲賵丕馗亘丞</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    body{margin:0;font-family:Tahoma,Arial;background:#f8fafc}
    #m{padding:25px;text-align:center;font-weight:bold;color:#0f172a}
    iframe{border:0;width:100vw;height:100vh;display:block}
  </style>
</head>
<body>
  <div id="m">噩丕乇賷 賮鬲丨 丕賱鬲胤亘賷賯...</div>
  <script>
    const EMPTY_LISTS_VERSION = 'empty-external-import-v1';

    function escapeRegExp(value){
      return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function replaceNamedStudentArrays(html){
      const names = [
        'SAMPLE_STUDENTS','DEFAULT_STUDENTS','DEMO_STUDENTS','INITIAL_STUDENTS',
        'sampleStudents','defaultStudents','demoStudents','initialStudents',
        'studentsData','studentData','studentsList','studentList',
        'sampleStudentsData','defaultStudentsData','demoStudentsData',
        'talamidh','defaultTalamidh','sampleTalamidh','eleves','defaultEleves',
        'pupils','defaultPupils','roster','defaultRoster','sampleRoster'
      ];

      for(const name of names){
        const safe = escapeRegExp(name);
        html = html.replace(
          new RegExp('(const|let|var)\\s+' + safe + '\\s*=\\s*\\[[\\s\\S]*?\\]\\s*;', 'g'),
          '$1 ' + name + ' = [];'
        );
        html = html.replace(
          new RegExp('window\\.' + safe + '\\s*=\\s*\\[[\\s\\S]*?\\]\\s*;', 'g'),
          'window.' + name + ' = [];'
        );
      }
      return html;
    }

    function patchInnerApp(html){
      html = replaceNamedStudentArrays(html);

      const preload = `
<script>
(function(){
  var stamp='${EMPTY_LISTS_VERSION}';
  var studentKeyPattern=/(student|students|pupil|pupils|eleve|eleves|talam|talamidh|roster|鬲賱賲賷匕|鬲賱丕賲賷匕|賯丕卅賲丞|賯賵丕卅賲)/i;

  try{
    if(localStorage.getItem('__sira_empty_lists_version__')!==stamp){
      Object.keys(localStorage).forEach(function(k){
        if(studentKeyPattern.test(k)) localStorage.removeItem(k);
      });
      localStorage.setItem('__sira_empty_lists_version__', stamp);
    }
    window.__SIRA_FORCE_EMPTY_STUDENT_LISTS__ = true;
  }catch(e){}

  var originalSetItem = Storage.prototype.setItem;
  Storage.prototype.setItem = function(key, value){
    try{
      if(window.__SIRA_FORCE_EMPTY_STUDENT_LISTS__ && studentKeyPattern.test(String(key))){
        var text = String(value || '');
        var looksLikeDemoList = /兀丨賲丿|賲丨賲丿|爻毓賵丿|賮賷氐賱|丕賱丨乇亘賷|丕賱丿賵爻乇賷|丕賱氐賮 丕賱毓丕卮乇|demo|sample|default/i.test(text);
        if(looksLikeDemoList){
          return originalSetItem.call(this, key, '[]');
        }
      }
    }catch(e){}
    return originalSetItem.apply(this, arguments);
  };
})();
<\/script>
      `;

      if(/<head[^>]*>/i.test(html)){
        html = html.replace(/<head[^>]*>/i, function(match){ return match + preload; });
      }else{
        html = preload + html;
      }

      return html;
    }

    async function run(){
      try{
        const treeResponse = await fetch('https://api.github.com/repos/princejour/sira-firebase-test-apk/git/trees/main?recursive=1');
        const treeJson = await treeResponse.json();
        const zipItem = (treeJson.tree || [])
          .filter(x => /\.zip$/i.test(x.path))
          .sort((a,b) => a.path.localeCompare(b.path, undefined, {numeric:true}))
          .pop();

        if(!zipItem) throw Error('賱丕 賷賵噩丿 ZIP 賮賷 賲爻鬲賵丿毓 丕賱鬲胤亘賷賯');

        const zipUrl = 'https://raw.githubusercontent.com/princejour/sira-firebase-test-apk/main/' +
          zipItem.path.split('/').map(encodeURIComponent).join('/');

        const zipBytes = await (await fetch(zipUrl)).arrayBuffer();
        const zip = await JSZip.loadAsync(zipBytes);
        const indexPath = Object.keys(zip.files).find(p => /app\/src\/main\/assets\/index\.html$/i.test(p)) ||
          Object.keys(zip.files).find(p => /(^|\/)index\.html$/i.test(p));

        if(!indexPath) throw Error('賱賲 賷鬲賲 丕賱毓孬賵乇 毓賱賶 index.html 丿丕禺賱 ZIP');

        let html = await zip.files[indexPath].async('string');
        html = patchInnerApp(html);

        const frame = document.createElement('iframe');
        document.body.innerHTML = '';
        document.body.appendChild(frame);
        frame.srcdoc = html;
      }catch(e){
        document.getElementById('m').textContent = '禺胤兀: ' + e.message;
      }
    }

    run();
  </script>
</body>
</html>
